<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">

    <title>ANIMEREC</title>
    <style>
      section {
        padding: 80px 0;
      }
    </style>
  </head>
  <body>

    <!--------------- Navigation Bar ---------------->
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="pic/WHAT IS ANIME____.jpg"
            alt=""
            width="30"
            height="24"
            class="d-inline-block align-text-top"
          />
          ANIMEREC
        </a>
      </div>
    </nav>

    <nav class="navbar navbar-light" style="background-color: #e3f2fd">
      <!-- Navbar content --><!---color scheme-->
    </nav>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="about.html">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Rekomendari.html">Rekomendasi</a>
              </li>
            </ul>
          </ul>
          <form class="d-flex">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>

    <section id="home" class="text-center py-5">
      <div class="container">
        <h1>Welcome to ANIMEREC 🎌</h1>
        <p>Temukan anime terbaik untuk kamu tonton</p><br>
        <p>memberikan rekomendasi anime populer dari berbagai genre.</p>
      </div>
    </section>

    <!--------------- Carousel ---------------->
    <div class="carousel-caption">
      <h5>Anime</h5>
      <p>Rekomendasi pilihan</p>
    </div>
    <div
      id="carouselExampleIndicators"
      class="carousel slide"
      data-bs-ride="carousel"
    >
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide-to="0"
          class="active"
          aria-current="true"
          aria-label="Slide 1"
        ></button>
        <button
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide-to="1"
          aria-label="Slide 2"
        ></button>
        <button
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide-to="2"
          aria-label="Slide 3"
        ></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="pic/pic11.jpg"
            class="d-block w-100"
            alt="..."
            style="height: 480px; object-fit: cover"
          />
        </div>
        <div class="carousel-item">
          <img
            src="pic/pic22.jpg"
            class="d-block w-100"
            alt="..."
            style="height: 480px; object-fit: cover"
          />
        </div>
        <div class="carousel-item">
          <img
            src="pic/pic33.jpg"
            class="d-block w-100"
            alt="..."
            style="height: 480px; object-fit: cover"
          />
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselExampleIndicators"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselExampleIndicators"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
    <footer class="bg-dark text-white text-center py-3">
      <p>© 2026 ANIMEREC</p>
    </footer>
  </body>
</html>
